<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomofocus</title>
    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body>
    <div id="pomofocus">
        <div id="header">
            <h1>
                <img id="mainLogo" src="assets/icon-white2.png">
                Pomofocus
            </h1>
        </div>
        <div id="progressBar">
            <div id="progress"></div>
        </div>
        <div id="timer">
            <div id="controlPanel">
                <div id="modes">
                    <div id="modesContainer">
                        <button id="pomodoroMode" onclick="setTimerMode(this.id)">Pomodoro</button>
                        <button id="shortBreakMode" onclick="setTimerMode(this.id)">Short Break</button>
                        <button id="longBreakMode" onclick="setTimerMode(this.id)">Long Break</button>
                    </div>
                </div>
                <div id="time">
                    25:00
                </div>
                <div id="toggleButtonContainer">
                    <button id="toggleButton" onclick="toggleTimer()">START</button>
                </div>
            </div>
            <div id="sessionInfo">
                <div id="sessionCount">#1</div>
                <div id="sessionText">Time to focus!</div>
            </div>
        </div>
    </div>
    <script src="/src/js/main.js"></script>
</body>

</html>
